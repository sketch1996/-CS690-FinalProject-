<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
<rect width="900" height="520" fill="#1e1e2e"/>
<text x="450" y="30" fill="#cdd6f4" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">Domain Model – Device Tracker</text>

<!-- Device -->
<rect x="320" y="55" width="260" height="200" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
<rect x="320" y="55" width="260" height="36" rx="8" fill="#89b4fa"/>
<rect x="320" y="79" width="260" height="12" fill="#89b4fa"/>
<text x="450" y="79" fill="#1e1e2e" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Device</text>
<text x="332" y="108" fill="#cdd6f4" font-family="monospace" font-size="11">+ Id: string</text>
<text x="332" y="124" fill="#cdd6f4" font-family="monospace" font-size="11">+ Name: string</text>
<text x="332" y="140" fill="#cdd6f4" font-family="monospace" font-size="11">+ Type: DeviceType</text>
<text x="332" y="156" fill="#cdd6f4" font-family="monospace" font-size="11">+ Status: DeviceStatus</text>
<text x="332" y="172" fill="#cdd6f4" font-family="monospace" font-size="11">+ SystemName: string</text>
<text x="332" y="188" fill="#cdd6f4" font-family="monospace" font-size="11">+ Location: string</text>
<text x="332" y="204" fill="#cdd6f4" font-family="monospace" font-size="11">+ IpAddress: string?</text>
<text x="332" y="220" fill="#cdd6f4" font-family="monospace" font-size="11">+ AssignedTo: string?</text>
<text x="332" y="236" fill="#cdd6f4" font-family="monospace" font-size="11">+ CreatedAt, UpdatedAt</text>

<!-- Issue -->
<rect x="40" y="310" width="240" height="175" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
<rect x="40" y="310" width="240" height="36" rx="8" fill="#a6e3a1"/>
<rect x="40" y="334" width="240" height="12" fill="#a6e3a1"/>
<text x="160" y="334" fill="#1e1e2e" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Issue</text>
<text x="52" y="363" fill="#cdd6f4" font-family="monospace" font-size="11">+ Id: string</text>
<text x="52" y="379" fill="#cdd6f4" font-family="monospace" font-size="11">+ DeviceId: string</text>
<text x="52" y="395" fill="#cdd6f4" font-family="monospace" font-size="11">+ Description: string</text>
<text x="52" y="411" fill="#cdd6f4" font-family="monospace" font-size="11">+ Severity: IssueSeverity</text>
<text x="52" y="427" fill="#cdd6f4" font-family="monospace" font-size="11">+ Status: IssueStatus</text>
<text x="52" y="443" fill="#cdd6f4" font-family="monospace" font-size="11">+ ReportedBy: string</text>
<text x="52" y="459" fill="#cdd6f4" font-family="monospace" font-size="11">+ ResolvedBy: string?</text>
<text x="52" y="475" fill="#cdd6f4" font-family="monospace" font-size="11">+ ReportedAt, ResolvedAt</text>

<!-- Assignment -->
<rect x="620" y="310" width="240" height="160" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
<rect x="620" y="310" width="240" height="36" rx="8" fill="#fab387"/>
<rect x="620" y="334" width="240" height="12" fill="#fab387"/>
<text x="740" y="334" fill="#1e1e2e" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Assignment</text>
<text x="632" y="363" fill="#cdd6f4" font-family="monospace" font-size="11">+ Id: string</text>
<text x="632" y="379" fill="#cdd6f4" font-family="monospace" font-size="11">+ DeviceId: string</text>
<text x="632" y="395" fill="#cdd6f4" font-family="monospace" font-size="11">+ TechnicianName: string</text>
<text x="632" y="411" fill="#cdd6f4" font-family="monospace" font-size="11">+ Task: string</text>
<text x="632" y="427" fill="#cdd6f4" font-family="monospace" font-size="11">+ AssignedAt: DateTime</text>
<text x="632" y="443" fill="#cdd6f4" font-family="monospace" font-size="11">+ CompletedAt: DateTime?</text>
<text x="632" y="459" fill="#cdd6f4" font-family="monospace" font-size="11">+ Notes: string?</text>

<!-- Arrows Device→Issue -->
<line x1="370" y1="255" x2="200" y2="310" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arr)"/>
<text x="240" y="290" fill="#a6e3a1" font-family="monospace" font-size="11">1..*</text>

<!-- Arrows Device→Assignment -->
<line x1="530" y1="255" x2="700" y2="310" stroke="#fab387" stroke-width="2" marker-end="url(#arr2)"/>
<text x="610" y="290" fill="#fab387" font-family="monospace" font-size="11">1..*</text>

<!-- Enums -->
<rect x="40" y="60" width="200" height="110" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="140" y="82" fill="#cba6f7" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">«enum» DeviceType</text>
<text x="52" y="100" fill="#bac2de" font-family="monospace" font-size="10">Controller</text>
<text x="52" y="114" fill="#bac2de" font-family="monospace" font-size="10">Sensor</text>
<text x="52" y="128" fill="#bac2de" font-family="monospace" font-size="10">NetworkEquipment</text>
<text x="52" y="142" fill="#bac2de" font-family="monospace" font-size="10">Server · StorageUnit</text>
<text x="52" y="156" fill="#bac2de" font-family="monospace" font-size="10">PowerUnit · Other</text>

<rect x="660" y="60" width="210" height="100" rx="6" fill="#181825" stroke="#cba6f7" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="765" y="82" fill="#cba6f7" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">«enum» DeviceStatus</text>
<text x="672" y="100" fill="#bac2de" font-family="monospace" font-size="10">Pending · Installed</text>
<text x="672" y="114" fill="#bac2de" font-family="monospace" font-size="10">Configured · Active</text>
<text x="672" y="128" fill="#bac2de" font-family="monospace" font-size="10">Faulty · Decommissioned</text>

<rect x="640" y="490" width="220" height="24" rx="6" fill="#181825" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="750" y="506" fill="#f38ba8" font-family="monospace" font-size="10" text-anchor="middle">«enum» IssueSeverity: Low Medium High Critical</text>

<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,0 L10,5 L0,10 Z" fill="#a6e3a1"/>
</marker>
<marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,0 L10,5 L0,10 Z" fill="#fab387"/>
</marker>
</defs>
</svg>