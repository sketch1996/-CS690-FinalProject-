<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
<rect width="700" height="500" fill="#1e1e2e"/>
<text x="350" y="32" fill="#cdd6f4" font-family="monospace" font-size="17" font-weight="bold" text-anchor="middle">Architecture – Device Tracker</text>

<!-- UI Layer -->
<rect x="80" y="55" width="540" height="80" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
<text x="350" y="82" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">UI Layer</text>
<rect x="110" y="90" width="200" height="34" rx="6" fill="#1e1e2e" stroke="#89b4fa" stroke-width="1"/>
<text x="210" y="112" fill="#cdd6f4" font-family="monospace" font-size="12" text-anchor="middle">ConsoleHelper</text>
<rect x="390" y="90" width="200" height="34" rx="6" fill="#1e1e2e" stroke="#89b4fa" stroke-width="1"/>
<text x="490" y="112" fill="#cdd6f4" font-family="monospace" font-size="12" text-anchor="middle">MenuHandler</text>

<!-- Arrow -->
<line x1="350" y1="135" x2="350" y2="160" stroke="#585b70" stroke-width="2" marker-end="url(#da)"/>
<text x="360" y="152" fill="#585b70" font-family="monospace" font-size="10">calls</text>

<!-- Service Layer -->
<rect x="80" y="160" width="540" height="90" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
<text x="350" y="183" fill="#a6e3a1" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Service Layer</text>
<rect x="100" y="191" width="130" height="30" rx="5" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1"/>
<text x="165" y="211" fill="#cdd6f4" font-family="monospace" font-size="11" text-anchor="middle">DeviceService</text>
<rect x="246" y="191" width="120" height="30" rx="5" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1"/>
<text x="306" y="211" fill="#cdd6f4" font-family="monospace" font-size="11" text-anchor="middle">IssueService</text>
<rect x="382" y="191" width="140" height="30" rx="5" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1"/>
<text x="452" y="211" fill="#cdd6f4" font-family="monospace" font-size="11" text-anchor="middle">AssignmentService</text>
<rect x="538" y="191" width="64" height="30" rx="5" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1"/>
<text x="570" y="211" fill="#cdd6f4" font-family="monospace" font-size="10" text-anchor="middle">ReportSvc</text>

<!-- Arrow -->
<line x1="350" y1="250" x2="350" y2="275" stroke="#585b70" stroke-width="2" marker-end="url(#da)"/>
<text x="360" y="267" fill="#585b70" font-family="monospace" font-size="10">reads/writes</text>

<!-- Data Layer -->
<rect x="180" y="275" width="340" height="70" rx="10" fill="#313244" stroke="#fab387" stroke-width="2"/>
<text x="350" y="298" fill="#fab387" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Data Layer</text>
<rect x="220" y="306" width="260" height="28" rx="5" fill="#1e1e2e" stroke="#fab387" stroke-width="1"/>
<text x="350" y="325" fill="#cdd6f4" font-family="monospace" font-size="12" text-anchor="middle">DataStore (JSON persistence)</text>

<!-- Arrow -->
<line x1="350" y1="345" x2="350" y2="370" stroke="#585b70" stroke-width="2" marker-end="url(#da)"/>
<text x="360" y="362" fill="#585b70" font-family="monospace" font-size="10">defines</text>

<!-- Model Layer -->
<rect x="80" y="370" width="540" height="70" rx="10" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
<text x="350" y="393" fill="#cba6f7" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Model Layer</text>
<rect x="110" y="400" width="100" height="28" rx="5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1"/>
<text x="160" y="419" fill="#cdd6f4" font-family="monospace" font-size="12" text-anchor="middle">Device</text>
<rect x="230" y="400" width="90" height="28" rx="5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1"/>
<text x="275" y="419" fill="#cdd6f4" font-family="monospace" font-size="12" text-anchor="middle">Issue</text>
<rect x="340" y="400" width="120" height="28" rx="5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1"/>
<text x="400" y="419" fill="#cdd6f4" font-family="monospace" font-size="12" text-anchor="middle">Assignment</text>
<rect x="480" y="400" width="110" height="28" rx="5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1" stroke-dasharray="5,3"/>
<text x="535" y="419" fill="#bac2de" font-family="monospace" font-size="11" text-anchor="middle">+ Enums</text>

<!-- Storage note -->
<text x="350" y="468" fill="#6c7086" font-family="monospace" font-size="11" text-anchor="middle">Storage: ~/AppData/DeviceTracker/*.json</text>

<defs><marker id="da" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#585b70"/></marker></defs>
</svg>